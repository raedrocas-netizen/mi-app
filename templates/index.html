<!DOCTYPE html>
<html>
<head>
    <title>Pedidos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="dark">
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">📦 App lecleire</span>

    <div class="d-flex align-items-center gap-3">
        <button onclick="toggleMode()" class="btn btn-light btn-sm">🌙/☀️</button>

        <span class="text-white">{{ session['user'] }}</span>

        <a href="/logout" class="btn btn-danger btn-sm">Salir</a>
    </div>
</nav>
<div class="container mt-4">

    <div class="card shadow p-4">
        <h2 class="text-center mb-4">📦 Nuevo Pedido</h2>

        <form action="/agregar" method="post">

            <input class="form-control mb-3" type="text" name="codigo" placeholder="Código" required>

            <input class="form-control mb-3" type="text" name="producto" placeholder="Producto" required>

            <input class="form-control mb-3" type="text" name="cliente" placeholder="Cliente" required>

            <input class="form-control mb-3" type="number" name="cantidad" placeholder="Cantidad" required>

            <input class="form-control mb-2" type="number" name="precio" placeholder="Precio" required>

            <button class="btn btn-primary w-100">Agregar Pedido</button>

        </form>

        <a href="/lista" class="btn btn-success mt-3 w-100">📋 Ver pedidos</a>
    </div>

</div>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
