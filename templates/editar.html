<!DOCTYPE html>
<html>
<head>
    <title>Editar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="dark">

<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">App lecleire</span>

    <div class="d-flex align-items-center gap-3">
        <button onclick="toggleMode()" class="btn btn-light btn-sm">🌙/☀️</button>

        <span class="text-white">{{ session['user'] }}</span>

        <a href="/logout" class="btn btn-danger btn-sm">Salir</a>
    </div>
</nav>
<div class="container mt-4">

    <div class="card shadow p-4">
        <h2 class="text-center mb-4">✏️ Editar Pedido</h2>

        <form method="post">

            <input class="form-control mb-3" type="text" name="codigo" value="{{ p[1] }}">

            <input class="form-control mb-3" type="text" name="producto" value="{{ p[2] }}">

            <input class="form-control mb-3" type="text" name="cliente" value="{{ p[3] }}">

            <input class="form-control mb-3" type="number" name="cantidad" value="{{ p[4] }}">

            <button class="btn btn-warning w-100">Guardar cambios</button>

        </form>

    </div>

</div>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
