<!DOCTYPE html>
<html>
<head>
    <title>Lista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="dark">
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">📦 App lecleire</span>

    <div class="d-flex align-items-center gap-3">
        <button onclick="toggleMode()" class="btn btn-light btn-sm">🌙/☀️</button>

        <span class="text-white">{{ session['user'] }}</span>

        <a href="/logout" class="btn btn-danger btn-sm">Salir</a>
    </div>
</nav>
<div class="container mt-4">

    <h2 class="text-center mb-3">📋 Pedidos</h2>

    <!-- BUSCADOR -->
    <form class="d-flex mb-3">
        <input class="form-control me-2" type="text" name="buscar" placeholder="Buscar cliente o código">
        <button class="btn btn-primary">Buscar</button>
    </form>

    <!-- TABLA -->
    <div class="card shadow p-3">
        <table class="table table-striped text-center">
            <tr>
                <th>ID</th><th>Código</th><th>Producto</th><th>Cliente</th><th>Cantidad</th><th>Acciones</th>
            </tr>

            {% for p in pedidos %}
            <tr>
                <td>{{ p[0] }}</td>
                <td>{{ p[1] }}</td>
                <td>{{ p[2] }}</td>
                <td>{{ p[3] }}</td>
                <td>{{ p[4] }}</td>
                <td>
                    <a href="/editar/{{p[0]}}" class="btn btn-warning btn-sm">✏️</a>
                    <a href="/eliminar/{{p[0]}}" class="btn btn-danger btn-sm" onclick="return confirm('¿Seguro que deseas eliminar este pedido?')">🗑️
</a>
                </td>
            </tr>
            {% endfor %}
        </table>
    </div>

    <!-- TOTAL -->
    <div class="alert alert-info mt-3 text-center">
        Total de productos: <strong>{{ total }}</strong>
    </div>

    <!-- BOTONES -->
    <div class="d-grid gap-2">
        <button onclick="window.print()" class="btn btn-secondary">🖨️ Imprimir</button>
        <a href="/pdf" class="btn btn-dark">📄 Exportar PDF</a>
        <a href="/" class="btn btn-success">➕ Nuevo Pedido</a>
    </div>

</div>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
