<!DOCTYPE html>
<html>
<head>
    <title>Registro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body class="d-flex justify-content-center align-items-center vh-100">
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">📦 App Lecleire</span>

    <div class="d-flex align-items-center gap-3">
        <button onclick="toggleMode()" class="btn btn-light btn-sm">🌙/☀️</button>

        <span class="text-white">{{ session['user'] }}</span>

        <a href="/logout" class="btn btn-danger btn-sm">Salir</a>
    </div>
</nav>
<div class="card p-4 shadow" style="width: 350px;">

    <h3 class="text-center mb-3">📝 Crear Cuenta</h3>

    <form method="post">

        <input class="form-control mb-3" name="username" placeholder="Usuario" required>

        <input class="form-control mb-3" type="password" name="password" placeholder="Contraseña" required>

        <button class="btn btn-success w-100">Registrar</button>

    </form>

    <div class="text-center mt-3">
        <a href="/">Volver al login</a>
    </div>

</div>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
